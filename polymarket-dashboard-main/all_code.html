    setIsDark(html.getAttribute(&apos;data-theme&apos;) === &apos;dark&apos;);
  }, []);

    const html = document.documentElement;
    const nowDark = html.getAttribute(&apos;data-theme&apos;) === &apos;dark&apos;;

  const navItems = [

          &lt;svg width=&quot;22&quot; height=&quot;22&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot;&gt;
            &lt;rect width=&quot;24&quot; height=&quot;24&quot; rx=&quot;6&quot; fill=&quot;var(--color-primary)&quot; opacity=&quot;0.15&quot;/&gt;
            &lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;5&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; fill=&quot;none&quot;/&gt;
            &lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;2&quot; fill=&quot;var(--color-primary)&quot;/&gt;
            &lt;line x1=&quot;12&quot; y1=&quot;2&quot; x2=&quot;12&quot; y2=&quot;7&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;
            &lt;line x1=&quot;12&quot; y1=&quot;17&quot; x2=&quot;12&quot; y2=&quot;22&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;
            &lt;line x1=&quot;2&quot; y1=&quot;12&quot; x2=&quot;7&quot; y2=&quot;12&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;
            &lt;line x1=&quot;17&quot; y1=&quot;12&quot; x2=&quot;22&quot; y2=&quot;12&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;
          &lt;/svg&gt;
          Wallet Intel
        &lt;/div&gt;
        &lt;button className=&quot;theme-toggle&quot; onClick={toggleTheme} aria-label=&quot;Toggle theme&quot;&gt;
          &lt;i data-lucide={isDark ? &apos;sun&apos; : &apos;moon&apos;} width=&quot;18&quot; height=&quot;18&quot;&gt;&lt;/i&gt;

      &lt;div className=&quot;app-layout&quot;&gt;

          &lt;div className=&quot;sidebar-logo&quot;&gt;
            &lt;svg width=&quot;22&quot; height=&quot;22&quot; viewBox=&quot;0 0 24 24&quot; fill=&quot;none&quot;&gt;
              &lt;rect width=&quot;24&quot; height=&quot;24&quot; rx=&quot;6&quot; fill=&quot;var(--color-primary)&quot; opacity=&quot;0.15&quot;/&gt;
              &lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;5&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; fill=&quot;none&quot;/&gt;
              &lt;circle cx=&quot;12&quot; cy=&quot;12&quot; r=&quot;2&quot; fill=&quot;var(--color-primary)&quot;/&gt;
              &lt;line x1=&quot;12&quot; y1=&quot;2&quot; x2=&quot;12&quot; y2=&quot;7&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;
              &lt;line x1=&quot;12&quot; y1=&quot;17&quot; x2=&quot;12&quot; y2=&quot;22&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;
              &lt;line x1=&quot;2&quot; y1=&quot;12&quot; x2=&quot;7&quot; y2=&quot;12&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;
              &lt;line x1=&quot;17&quot; y1=&quot;12&quot; x2=&quot;22&quot; y2=&quot;12&quot; stroke=&quot;var(--color-primary)&quot; strokeWidth=&quot;2&quot; strokeLinecap=&quot;round&quot;/&gt;

              return (
                &lt;Link href={path} key={item.id} className={`nav-item ${active ? &apos;active&apos; : &apos;&apos;}`} onClick={() =&gt; setSidebarOpen(false)}&gt;

            &lt;div className=&quot;nav-section-label&quot;&gt;Personal&lt;/div&gt;
            &lt;Link href=&quot;/watchlist&quot; className={`nav-item ${router.pathname === &apos;/watchlist&apos; ? &apos;active&apos; : &apos;&apos;}`} onClick={() =&gt; setSidebarOpen(false)}&gt;

export default function WalletAnalysis({ data, isCompareMode = false, compareSide = null }) {
  if (!data) return null;

  const { proxyWallet, leaderboard, analysis, recentTrades, dataSource } = data;
  const { score, verdict, verdictColor, flags, stats, categoryBreakdown } = analysis || {};

  const scoreClass = (s) =&gt; {
    if (s &gt;= 8.5) return &apos;elite&apos;;
    if (s &gt;= 7.0) return &apos;strong&apos;;
    if (s &gt;= 5.0) return &apos;moderate&apos;;
    if (s &gt;= 4.0) return &apos;risky&apos;;
    return &apos;poor&apos;;
  };

  const sc = scoreClass(score);
  const scoreMap = { elite:&apos;score-elite&apos;, strong:&apos;score-strong&apos;, moderate:&apos;score-moderate&apos;, risky:&apos;score-risky&apos;, poor:&apos;score-poor&apos; };
  const name = leaderboard?.userName || &apos;Unknown Trader&apos;;

  const fmt$ = (n) =&gt; {
    if (!n &amp;&amp; n !== 0) return &apos;$0&apos;;
    const v = parseFloat(n);
    if (v &gt;= 1e6) return &apos;$&apos; + (v / 1e6).toFixed(2) + &apos;M&apos;;
    if (v &gt;= 1e3) return &apos;$&apos; + (v / 1e3).toFixed(1) + &apos;K&apos;;
    return &apos;$&apos; + v.toFixed(0);
  };

  const kpis = [
    { label: &apos;P&amp;L&apos;, value: fmt$(stats?.pnl), delta: &apos;—&apos;, dir: &apos;neutral&apos;, tip: &apos;Net realized profit/loss&apos; },
    { label: &apos;Win Rate&apos;, value: `${stats?.winRate}%`, delta: &apos;—&apos;, dir: &apos;neutral&apos;, tip: &apos;Percentage of resolved bets resulting in profit&apos; },
    { label: &apos;Total Trades&apos;, value: stats?.totalPositions, delta: &apos;—&apos;, dir: &apos;neutral&apos;, tip: &apos;Total number of positions entered&apos; },
    { label: &apos;Active Months&apos;, value: stats?.activeMonths, delta: &apos;—&apos;, dir: &apos;neutral&apos;, tip: &apos;Number of active trading months&apos; },
  ];

  if (isCompareMode) {
    return (
      &lt;div style={{ display: &apos;flex&apos;, flexDirection: &apos;column&apos;, gap: &apos;var(--space-6)&apos; }}&gt;
        &lt;div className=&quot;wallet-header&quot; style={{ marginBottom: 0 }}&gt;
          &lt;div className={`score-badge ${scoreMap[sc]}`}&gt;
            &lt;div className=&quot;score-num&quot;&gt;{score}&lt;/div&gt;
            &lt;div className=&quot;score-lbl&quot;&gt;Score&lt;/div&gt;
          &lt;/div&gt;
          &lt;div className=&quot;wallet-header-info&quot;&gt;
            &lt;div className=&quot;flex gap-3&quot; style={{ alignItems: &apos;center&apos;, flexWrap: &apos;wrap&apos; }}&gt;
              &lt;div className=&quot;wallet-name&quot;&gt;{name}&lt;/div&gt;
              &lt;span className={`verdict verdict-${sc}`}&gt;{verdict}&lt;/span&gt;
            &lt;/div&gt;
            &lt;div className=&quot;wallet-address&quot; style={{ fontSize: &apos;10px&apos; }}&gt;{proxyWallet.slice(0, 16)}…&lt;/div&gt;
            &lt;div className=&quot;flag-wrap mt-4&quot;&gt;
              {(flags || []).slice(0, 2).map((f, i) =&gt; (
                &lt;span key={i} className=&quot;flag-chip flag-yellow&quot;&gt;
                  &lt;i data-lucide=&quot;alert-triangle&quot; width=&quot;11&quot; height=&quot;11&quot;&gt;&lt;/i&gt;
                  {f.label}
                &lt;/span&gt;
              ))}
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    );
  }

  return (
    &lt;&gt;
      {dataSource?.onChain === null &amp;&amp; (
        &lt;div className=&quot;fallback-banner&quot;&gt;
          &lt;i data-lucide=&quot;info&quot; width=&quot;14&quot; height=&quot;14&quot; style={{ flexShrink: 0 }}&gt;&lt;/i&gt;
          Leaderboard stats loaded. Deeper trade-history analysis is still pending — live data may differ.
        &lt;/div&gt;
      )}

      {/* Wallet Header Component */}
      &lt;div className=&quot;wallet-header&quot;&gt;
        &lt;div className={`score-badge ${scoreMap[sc]}`}&gt;
          &lt;div className=&quot;score-num&quot;&gt;{score}&lt;/div&gt;
          &lt;div className=&quot;score-lbl&quot;&gt;Score&lt;/div&gt;
        &lt;/div&gt;
        &lt;div className=&quot;wallet-header-info&quot;&gt;
          &lt;div className=&quot;flex gap-3&quot; style={{ flexWrap: &apos;wrap&apos;, alignItems: &apos;center&apos; }}&gt;
            &lt;div className=&quot;wallet-name&quot;&gt;{name} {leaderboard?.verifiedBadge &amp;&amp; &lt;span style={{color: &apos;#10b981&apos;, marginLeft: 4}}&gt;✓&lt;/span&gt;}&lt;/div&gt;
            &lt;span className={`verdict verdict-${sc}`}&gt;{verdict}&lt;/span&gt;
          &lt;/div&gt;
          &lt;div className=&quot;wallet-address&quot; title=&quot;Click to copy&quot; onClick={() =&gt; navigator.clipboard.writeText(proxyWallet)}&gt;
            &lt;i data-lucide=&quot;copy&quot; width=&quot;11&quot; height=&quot;11&quot;&gt;&lt;/i&gt;
            {proxyWallet}
          &lt;/div&gt;
          &lt;p style={{ fontSize: &apos;var(--text-sm)&apos;, color: &apos;var(--color-text-muted)&apos;, marginTop: &apos;var(--space-3)&apos;, maxWidth: &apos;60ch&apos; }}&gt;
            {analysis?.insights?.[0] || &apos;Analyzing trading patterns...&apos;}
          &lt;/p&gt;
          &lt;div className=&quot;wallet-actions&quot;&gt;
            &lt;Link href={`/compare?wallet=${proxyWallet}`} className=&quot;btn btn-primary btn-sm&quot;&gt;
              &lt;i data-lucide=&quot;git-compare&quot; width=&quot;13&quot; height=&quot;13&quot;&gt;&lt;/i&gt;
              Compare this wallet
            &lt;/Link&gt;
            &lt;button className=&quot;btn btn-secondary btn-sm&quot;&gt;
              &lt;i data-lucide=&quot;star&quot; width=&quot;13&quot; height=&quot;13&quot;&gt;&lt;/i&gt;
              Add to Watchlist
            &lt;/button&gt;
            &lt;button className=&quot;btn btn-ghost btn-sm text-muted&quot; onClick={() =&gt; navigator.clipboard.writeText(proxyWallet)}&gt;
              &lt;i data-lucide=&quot;copy&quot; width=&quot;13&quot; height=&quot;13&quot;&gt;&lt;/i&gt;
              Copy Address
            &lt;/button&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      {/* KPI Cards */}
      &lt;div className=&quot;section-heading&quot;&gt;Performance Metrics&lt;/div&gt;
      &lt;div className=&quot;kpi-grid&quot;&gt;
        {kpis.map((k, i) =&gt; (
          &lt;div key={i} className=&quot;kpi-card&quot; data-tip={k.tip}&gt;
            &lt;div className=&quot;kpi-label&quot;&gt;{k.label} &lt;i data-lucide=&quot;info&quot; width=&quot;10&quot; height=&quot;10&quot; style={{ color: &apos;var(--color-text-faint)&apos; }}&gt;&lt;/i&gt;&lt;/div&gt;
            &lt;div className=&quot;kpi-value&quot;&gt;{k.value}&lt;/div&gt;
            &lt;div className={`kpi-delta ${k.dir}`}&gt;
              {k.dir === &apos;up&apos; &amp;&amp; &lt;i data-lucide=&quot;trending-up&quot; width=&quot;11&quot; height=&quot;11&quot;&gt;&lt;/i&gt;}
              {k.dir === &apos;down&apos; &amp;&amp; &lt;i data-lucide=&quot;trending-down&quot; width=&quot;11&quot; height=&quot;11&quot;&gt;&lt;/i&gt;}
              {k.delta}
            &lt;/div&gt;
          &lt;/div&gt;
        ))}
      &lt;/div&gt;

      {/* Red Flag Chips */}
      {flags &amp;&amp; flags.length &gt; 0 &amp;&amp; (
        &lt;&gt;
          &lt;div className=&quot;section-heading&quot;&gt;Signal Summary&lt;/div&gt;
          &lt;div className=&quot;flag-wrap mb-6&quot;&gt;
            {flags.map((f, i) =&gt; (
              &lt;span key={i} className=&quot;flag-chip flag-yellow&quot;&gt;
                &lt;i data-lucide=&quot;alert-triangle&quot; width=&quot;11&quot; height=&quot;11&quot;&gt;&lt;/i&gt;
                {f.label} - {f.detail}
              &lt;/span&gt;
            ))}
          &lt;/div&gt;
        &lt;/&gt;
      )}

      {/* Recent Trades */}
      {recentTrades &amp;&amp; recentTrades.length &gt; 0 &amp;&amp; (
        &lt;&gt;
          &lt;div className=&quot;section-heading&quot;&gt;Recent Positions&lt;/div&gt;
          &lt;div className=&quot;card&quot; style={{ padding: 0, overflow: &apos;hidden&apos;, marginBottom: &apos;var(--space-6)&apos; }}&gt;
            &lt;div style={{ overflowX: &apos;auto&apos; }}&gt;
              &lt;table className=&quot;data-table&quot;&gt;
                &lt;thead&gt;
                  &lt;tr&gt;
                    &lt;th&gt;Market&lt;/th&gt;
                    &lt;th&gt;Bet&lt;/th&gt;
                    &lt;th&gt;Size&lt;/th&gt;
                    &lt;th&gt;Result&lt;/th&gt;
                    &lt;th&gt;Price&lt;/th&gt;
                  &lt;/tr&gt;
                &lt;/thead&gt;
                &lt;tbody&gt;
                  {recentTrades.map((t, i) =&gt; (
                    &lt;tr key={i}&gt;
                      &lt;td style={{ fontSize: &apos;var(--text-xs)&apos;, maxWidth: 220, overflow: &apos;hidden&apos;, textOverflow: &apos;ellipsis&apos;, whiteSpace: &apos;nowrap&apos; }}&gt;
                        {t.title}
                      &lt;/td&gt;
                      &lt;td&gt;
                        &lt;span className={`verdict ${t.side === &apos;BUY&apos; ? &apos;verdict-strong&apos; : &apos;verdict-risky&apos;}`}&gt;{t.side}&lt;/span&gt;
                      &lt;/td&gt;
                      &lt;td className=&quot;mono&quot;&gt;${t.usdcSize}&lt;/td&gt;
                      &lt;td style={{ fontSize: &apos;var(--text-xs)&apos;, color: &apos;var(--color-text-muted)&apos; }}&gt;{t.outcome}&lt;/td&gt;
                      &lt;td className=&quot;mono text-muted&quot;&gt;{t.price}&lt;/td&gt;
                    &lt;/tr&gt;
                  ))}
                &lt;/tbody&gt;
              &lt;/table&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        &lt;/&gt;
      )}
    &lt;/&gt;
  );
}

  --color-orange-highlight: #3a2810;
  --shadow-sm: 0 1px 2px oklch(0 0 0 / 0.25);
  --shadow-md: 0 4px 12px oklch(0 0 0 / 0.35);
  --shadow-lg: 0 12px 32px oklch(0 0 0 / 0.5);
}

/* ─── BASE ─────────────────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { -webkit-text-size-adjust: none; text-size-adjust: none; -webkit-font-smoothing: antialiased; scroll-behavior: smooth; }
body { min-height: 100dvh; font-family: var(--font-body); font-size: var(--text-sm); color: var(--color-text); background: var(--color-bg); overflow-x: hidden; }
img, svg { display: block; max-width: 100%; }
button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; }
a { color: inherit; text-decoration: none; }
:focus-visible { outline: 2px solid var(--color-primary); outline-offset: 3px; border-radius: var(--radius-sm); }

/* ─── LAYOUT ───────────────────────────────────────────────────────── */
.app-layout {
  display: grid;
  grid-template-columns: var(--sidebar-width) 1fr;
  grid-template-rows: auto 1fr;
  min-height: 100dvh;
}
.app-sidebar {
  grid-row: 1 / -1;
  width: var(--sidebar-width);
  background: var(--color-surface);
  border-right: 1px solid var(--color-border);
  position: fixed;
  top: 0; left: 0;
  height: 100dvh;
  display: flex;
  flex-direction: column;
  z-index: 100;
  transition: transform var(--transition-interactive);
}
.app-main {
  grid-column: 2;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
}
.app-topbar {
  height: var(--header-height);
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  padding: 0 var(--space-6);
  gap: var(--space-3);
  position: sticky;
  top: 0;
  z-index: 50;
}
.app-content {
  flex: 1;
  padding: var(--space-8) var(--space-6);
  max-width: 1100px;
  width: 100%;
}

/* ─── SIDEBAR ──────────────────────────────────────────────────────── */
.sidebar-logo {
  height: var(--header-height);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: 0 var(--space-5);
  border-bottom: 1px solid var(--color-border);
  font-size: var(--text-base);
  font-weight: 600;
  letter-spacing: -0.02em;
}
.sidebar-logo svg { color: var(--color-primary); flex-shrink: 0; }
.sidebar-nav {
  flex: 1;
  padding: var(--space-4) var(--space-3);
  display: flex;
  flex-direction: column;
  gap: var(--space-1);
  overflow-y: auto;
}
.nav-section-label {
  font-size: 10px;
  font-weight: 600;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--color-text-faint);
  padding: var(--space-4) var(--space-3) var(--space-2);
}
.nav-item {
  display: flex;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
  font-size: var(--text-sm);
  font-weight: 450;
  transition: color var(--transition-interactive), background var(--transition-interactive);
  cursor: pointer;
}
.nav-item:hover { color: var(--color-text); background: var(--color-surface-offset); }
.nav-item.active { color: var(--color-text); background: var(--color-primary-highlight); font-weight: 500; }
[data-theme=&quot;dark&quot;] .nav-item.active { color: var(--color-primary); }
.nav-item .nav-badge {
  margin-left: auto;
  font-size: 10px;
  padding: 1px 6px;
  border-radius: var(--radius-full);
  background: var(--color-surface-dynamic);
  color: var(--color-text-muted);
}
.sidebar-footer {
  padding: var(--space-4) var(--space-3);
  border-top: 1px solid var(--color-border);
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.theme-toggle {
  width: 32px; height: 32px;
  border-radius: var(--radius-md);
  display: flex; align-items: center; justify-content: center;
  color: var(--color-text-muted);
  transition: color var(--transition-interactive), background var(--transition-interactive);
}
.theme-toggle:hover { color: var(--color-text); background: var(--color-surface-offset); }

/* ─── MOBILE NAV ───────────────────────────────────────────────────── */
.mobile-header {
  display: none;
  height: 56px;
  background: var(--color-surface);
  border-bottom: 1px solid var(--color-border);
  padding: 0 var(--space-4);
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 200;
}
.mobile-menu-btn {
  width: 36px; height: 36px;
  display: flex; align-items: center; justify-content: center;
  border-radius: var(--radius-md);
  color: var(--color-text-muted);
}
.mobile-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: oklch(0 0 0 / 0.5);
  z-index: 90;
  backdrop-filter: blur(2px);
}
.mobile-overlay.visible { display: block; }

/* ─── BREADCRUMB ───────────────────────────────────────────────────── */
.breadcrumb {
  display: flex;
  align-items: center;
  gap: var(--space-2);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  margin-bottom: var(--space-6);
}
.breadcrumb-item { display: flex; align-items: center; gap: var(--space-2); }
.breadcrumb-item.clickable { color: var(--color-primary); cursor: pointer; transition: color var(--transition-interactive); }
.breadcrumb-item.clickable:hover { color: var(--color-primary-hover); }
.breadcrumb-sep { color: var(--color-text-faint); }

/* ─── PAGE HEADER ──────────────────────────────────────────────────── */
.page-header {
  display: flex;
  align-items: flex-start;
  justify-content: space-between;
  gap: var(--space-4);
  margin-bottom: var(--space-8);
}
.page-title { font-size: var(--text-xl); font-weight: 600; letter-spacing: -0.02em; line-height: 1.2; }
.page-subtitle { font-size: var(--text-sm); color: var(--color-text-muted); margin-top: var(--space-1); }

/* ─── BUTTONS ──────────────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-2) var(--space-4);
  border-radius: var(--radius-md);
  font-size: var(--text-sm);
  font-weight: 500;
  white-space: nowrap;
  transition: all var(--transition-interactive);
  min-height: 36px;
}
.btn-primary {
  background: var(--color-primary);
  color: white;
}
.btn-primary:hover { background: var(--color-primary-hover); }
.btn-primary:active { background: var(--color-primary-active); }
.btn-secondary {
  background: var(--color-surface-offset);
  color: var(--color-text);
  border: 1px solid var(--color-border);
}
.btn-secondary:hover { background: var(--color-surface-dynamic); }
.btn-ghost {
  color: var(--color-text-muted);
  padding: var(--space-2) var(--space-3);
}
.btn-ghost:hover { background: var(--color-surface-offset); color: var(--color-text); }
.btn-sm { padding: var(--space-1) var(--space-3); min-height: 28px; font-size: var(--text-xs); }
.btn-lg { padding: var(--space-3) var(--space-6); min-height: 44px; }
.btn-icon { width: 36px; height: 36px; padding: 0; justify-content: center; }

/* ─── CARDS ────────────────────────────────────────────────────────── */
.card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-5);
}
.card-sm { padding: var(--space-4); }
.card-header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: var(--space-4);
}
.card-title { font-size: var(--text-sm); font-weight: 600; color: var(--color-text); }
.card-subtitle { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }

/* ─── KPI GRID ─────────────────────────────────────────────────────── */
.kpi-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
  gap: var(--space-3);
  margin-bottom: var(--space-6);
}
.kpi-card {
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  padding: var(--space-4) var(--space-5);
  position: relative;
}
.kpi-label {
  font-size: var(--text-xs);
  font-weight: 500;
  color: var(--color-text-muted);
  text-transform: uppercase;
  letter-spacing: 0.05em;
  display: flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-2);
}
.kpi-value {
  font-size: var(--text-lg);
  font-weight: 700;
  letter-spacing: -0.02em;
  font-variant-numeric: tabular-nums;
  line-height: 1.2;
}
.kpi-delta {
  font-size: var(--text-xs);
  font-weight: 500;
  margin-top: var(--space-1);
  display: flex;
  align-items: center;
  gap: 2px;
}
.kpi-delta.up { color: var(--color-success); }
.kpi-delta.down { color: var(--color-error); }
.kpi-delta.neutral { color: var(--color-text-muted); }

/* ─── SCORE BADGE ──────────────────────────────────────────────────── */
.score-badge {
  display: inline-flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  width: 88px;
  height: 88px;
  border-radius: var(--radius-xl);
  border: 2px solid;
  font-variant-numeric: tabular-nums;
}
.score-badge .score-num {
  font-size: 28px;
  font-weight: 800;
  line-height: 1;
  letter-spacing: -0.03em;
}
.score-badge .score-lbl {
  font-size: 9px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  margin-top: 2px;
  opacity: 0.7;
}
.score-elite { border-color: var(--color-gold); color: var(--color-gold); background: var(--color-gold-highlight); }
.score-strong { border-color: var(--color-success); color: var(--color-success); background: var(--color-success-highlight); }
.score-moderate { border-color: var(--color-primary); color: var(--color-primary); background: var(--color-primary-highlight); }
.score-risky { border-color: var(--color-warning); color: var(--color-warning); background: var(--color-warning-highlight); }
.score-poor { border-color: var(--color-error); color: var(--color-error); background: var(--color-error-highlight); }

/* ─── VERDICT BADGE ────────────────────────────────────────────────── */
.verdict {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  font-weight: 600;
  letter-spacing: 0.03em;
}
.verdict-elite { background: var(--color-gold-highlight); color: var(--color-gold); }
.verdict-strong { background: var(--color-success-highlight); color: var(--color-success); }
.verdict-moderate { background: var(--color-primary-highlight); color: var(--color-primary); }
.verdict-risky { background: var(--color-warning-highlight); color: var(--color-warning); }
.verdict-poor { background: var(--color-error-highlight); color: var(--color-error); }

/* ─── FLAG CHIPS ───────────────────────────────────────────────────── */
.flag-chip {
  display: inline-flex;
  align-items: center;
  gap: var(--space-1);
  padding: 3px var(--space-2);
  border-radius: var(--radius-full);
  font-size: 11px;
  font-weight: 500;
  border: 1px solid;
}
.flag-red { background: var(--color-error-highlight); color: var(--color-error); border-color: oklch(from var(--color-error) l c h / 0.25); }
.flag-yellow { background: var(--color-warning-highlight); color: var(--color-warning); border-color: oklch(from var(--color-warning) l c h / 0.25); }
.flag-green { background: var(--color-success-highlight); color: var(--color-success); border-color: oklch(from var(--color-success) l c h / 0.25); }
.flag-wrap { display: flex; flex-wrap: wrap; gap: var(--space-2); }

/* ─── WALLET HEADER COMPONENT ──────────────────────────────────────── */
.wallet-header {
  display: flex;
  align-items: flex-start;
  gap: var(--space-5);
  padding: var(--space-5);
  background: var(--color-surface);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-lg);
  margin-bottom: var(--space-6);
}
.wallet-header-info { flex: 1; min-width: 0; }
.wallet-address {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
  background: var(--color-surface-offset);
  padding: var(--space-1) var(--space-2);
  border-radius: var(--radius-sm);
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  cursor: pointer;
  border: 1px solid var(--color-border);
  transition: border-color var(--transition-interactive);
}
.wallet-address:hover { border-color: var(--color-primary); color: var(--color-text); }
.wallet-name { font-size: var(--text-base); font-weight: 600; margin-bottom: var(--space-2); }
.wallet-actions { display: flex; gap: var(--space-2); margin-top: var(--space-3); flex-wrap: wrap; }

/* ─── SEARCH BOX ───────────────────────────────────────────────────── */
.search-box {
  position: relative;
  display: flex;
  align-items: center;
}
.search-box input {
  width: 100%;
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4) var(--space-3) 40px;
  font-size: var(--text-sm);
  color: var(--color-text);
  transition: border-color var(--transition-interactive), box-shadow var(--transition-interactive);
  font-family: var(--font-mono);
}
.search-box input:focus { outline: none; border-color: var(--color-primary); box-shadow: 0 0 0 3px oklch(from var(--color-primary) l c h / 0.15); }
.search-box input::placeholder { font-family: var(--font-body); color: var(--color-text-muted); }
.search-icon { position: absolute; left: var(--space-3); color: var(--color-text-muted); pointer-events: none; }
.search-btn {
  position: absolute;
  right: var(--space-2);
  padding: var(--space-1) var(--space-3);
  background: var(--color-primary);
  color: white;
  border-radius: var(--radius-sm);
  font-size: var(--text-xs);
  font-weight: 500;
  min-height: 28px;
  transition: background var(--transition-interactive);
}
.search-btn:hover { background: var(--color-primary-hover); }

/* ─── SKELETON ─────────────────────────────────────────────────────── */
@keyframes shimmer {
  0%   { background-position: -200% 0; }
  100% { background-position:  200% 0; }
}
.skeleton {
  background: linear-gradient(90deg,
    var(--color-surface-offset) 25%,
    var(--color-surface-dynamic) 50%,
    var(--color-surface-offset) 75%);
  background-size: 200% 100%;
  animation: shimmer 1.6s ease-in-out infinite;
  border-radius: var(--radius-sm);
}
@media (prefers-reduced-motion: reduce) {
  .skeleton { animation: none; background: var(--color-surface-offset); }
}
.skel-text  { height: 14px; margin-bottom: var(--space-2); border-radius: var(--radius-sm); }
.skel-h     { height: 22px; margin-bottom: var(--space-3); border-radius: var(--radius-sm); }
.skel-card  { height: 80px; border-radius: var(--radius-lg); }
.skel-badge { width: 88px; height: 88px; border-radius: var(--radius-xl); }

/* ─── STATES ───────────────────────────────────────────────────────── */
.state-box {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
  padding: var(--space-16) var(--space-8);
  color: var(--color-text-muted);
  gap: var(--space-3);
}
.state-box .state-icon { width: 48px; height: 48px; color: var(--color-text-faint); }
.state-box h3 { font-size: var(--text-base); font-weight: 600; color: var(--color-text); }
.state-box p { font-size: var(--text-sm); max-width: 36ch; }

/* ─── TOOLTIP ──────────────────────────────────────────────────────── */
[data-tip] { position: relative; cursor: help; }
[data-tip]::after {
  content: attr(data-tip);
  position: absolute;
  bottom: calc(100% + 8px);
  left: 50%;
  transform: translateX(-50%);
  background: var(--color-surface-dynamic);
  color: var(--color-text);
  font-size: 11px;
  font-family: var(--font-body);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-sm);
  white-space: nowrap;
  max-width: 220px;
  white-space: normal;
  text-align: center;
  pointer-events: none;
  opacity: 0;
  transition: opacity 180ms;
  z-index: 500;
  border: 1px solid var(--color-border);
  box-shadow: var(--shadow-md);
}
[data-tip]:hover::after { opacity: 1; }

/* ─── TABLE ────────────────────────────────────────────────────────── */
.data-table { width: 100%; border-collapse: collapse; }
.data-table th {
  font-size: var(--text-xs);
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  color: var(--color-text-muted);
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-border);
  text-align: left;
  white-space: nowrap;
}
.data-table td {
  padding: var(--space-3) var(--space-4);
  border-bottom: 1px solid var(--color-divider);
  font-size: var(--text-sm);
  font-variant-numeric: tabular-nums;
  vertical-align: middle;
}
.data-table tr:last-child td { border-bottom: none; }
.data-table tbody tr { cursor: pointer; transition: background var(--transition-interactive); }
.data-table tbody tr:hover { background: var(--color-surface-offset); }
.wallet-link { font-family: var(--font-mono); font-size: var(--text-xs); color: var(--color-primary); transition: color var(--transition-interactive); }
.wallet-link:hover { color: var(--color-primary-hover); }

/* ─── DIVIDER ──────────────────────────────────────────────────────── */
.divider { height: 1px; background: var(--color-divider); margin: var(--space-6) 0; }

/* ─── SECTION HEADING ──────────────────────────────────────────────── */
.section-heading {
  font-size: var(--text-xs);
  font-weight: 700;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  color: var(--color-text-muted);
  margin-bottom: var(--space-4);
  display: flex;
  align-items: center;
  gap: var(--space-3);
}
.section-heading::after {
  content: &apos;&apos;;
  flex: 1;
  height: 1px;
  background: var(--color-divider);
}

/* ─── ONBOARDING ───────────────────────────────────────────────────── */
.onboarding-card {
  background: color-mix(in oklch, var(--color-primary) 6%, var(--color-surface));
  border: 1px solid color-mix(in oklch, var(--color-primary) 20%, var(--color-border));
  border-radius: var(--radius-xl);
  padding: var(--space-8);
  margin-bottom: var(--space-8);
}
.onboarding-card h2 { font-size: var(--text-lg); font-weight: 700; margin-bottom: var(--space-2); letter-spacing: -0.01em; }
.onboarding-card p { font-size: var(--text-sm); color: var(--color-text-muted); max-width: 52ch; margin-bottom: var(--space-5); }
.example-wallet {
  font-family: var(--font-mono);
  font-size: var(--text-xs);
  color: var(--color-primary);
  background: var(--color-surface-offset);
  border: 1px solid var(--color-border);
  padding: var(--space-2) var(--space-3);
  border-radius: var(--radius-md);
  cursor: pointer;
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  margin-bottom: var(--space-5);
  transition: border-color var(--transition-interactive);
}
.example-wallet:hover { border-color: var(--color-primary); }

/* ─── FALLBACK BANNER ──────────────────────────────────────────────── */
.fallback-banner {
  background: var(--color-warning-highlight);
  border: 1px solid oklch(from var(--color-warning) l c h / 0.3);
  border-radius: var(--radius-md);
  padding: var(--space-3) var(--space-4);
  font-size: var(--text-xs);
  color: var(--color-warning);
  display: flex;
  align-items: center;
  gap: var(--space-3);
  margin-bottom: var(--space-5);
}

/* ─── WATCHLIST PLACEHOLDER ────────────────────────────────────────── */
.placeholder-pill {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: var(--space-1) var(--space-3);
  background: var(--color-surface-offset);
  border: 1px dashed var(--color-border);
  border-radius: var(--radius-full);
  font-size: var(--text-xs);
  color: var(--color-text-muted);
}

/* ─── VIEWS (hidden/shown via JS) ──────────────────────────────────── */
.view { display: none; }
.view.active { display: block; }

/* ─── RESPONSIVE ───────────────────────────────────────────────────── */
@media (max-width: 768px) {
  .app-layout { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  .app-sidebar { transform: translateX(-100%); }
  .app-sidebar.open { transform: translateX(0); box-shadow: var(--shadow-lg); }
  .app-main { grid-column: 1; }
  .mobile-header { display: flex; }
  .app-topbar { display: none; }
  .app-content { padding: var(--space-5) var(--space-4); }
  .kpi-grid { grid-template-columns: repeat(2, 1fr); }
  .wallet-header { flex-direction: column; }
  .page-header { flex-direction: column; }
}
@media (max-width: 480px) {
  .kpi-grid { grid-template-columns: 1fr 1fr; }
  .btn-lg { min-height: 44px; }
}

/* ─── UTILS ────────────────────────────────────────────────────────── */
.mono { font-family: var(--font-mono); }
.text-muted { color: var(--color-text-muted); }
.text-faint { color: var(--color-text-faint); }
.text-success { color: var(--color-success); }
.text-error { color: var(--color-error); }
.text-warning { color: var(--color-warning); }
.text-primary { color: var(--color-primary); }
.flex { display: flex; align-items: center; }
.gap-2 { gap: var(--space-2); }

                      &lt;td&gt;

                      &lt;td style={{ fontWeight: 500 }} className={w.pnl.startsWith(&apos;+&apos;) ? &apos;text-success&apos; : &apos;text-error&apos;}&gt;{w.pnl}&lt;/td&gt;

                        &lt;/button&gt;
                      &lt;/td&gt;
                    &lt;/tr&gt;
                  );
                })}
              &lt;/tbody&gt;
            &lt;/table&gt;
          &lt;/div&gt;
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/&gt;
  );
}

import Head from &apos;next/head&apos;;
import { useRouter } from &apos;next/router&apos;;
import WalletAnalysis from &apos;../components/WalletAnalysis&apos;;

export default function WalletVetting() {
  const router = useRouter();
  const [query, setQuery] = useState(&apos;&apos;);
  const [data, setData] = useState(null);
  const [loading, setLoading] = useState(false);
  const [error, setError] = useState(null);
  const [searched, setSearched] = useState(false);

  useEffect(() =&gt; {
    if (router.query.wallet) {
      setQuery(router.query.wallet);
      handleSearch(router.query.wallet);
    }
  }, [router.query.wallet]);

  const handleSearch = async (searchQuery = query) =&gt; {
    if (!searchQuery.trim()) return;
    setLoading(true);
    setError(null);
    setData(null);
    setSearched(true);
    
    try {
      const res = await fetch(`/api/wallet?query=${encodeURIComponent(searchQuery.trim())}`);
      const json = await res.json();
      if (!res.ok) throw new Error(json.error || &apos;Lookup failed&apos;);
      setData(json);
    } catch (e) {
      setError(e.message);
    } finally {
      setLoading(false);
      setTimeout(() =&gt; {
        if (typeof window !== &apos;undefined&apos; &amp;&amp; window.lucide) {
          window.lucide.createIcons();
        }
      }, 50);
    }
  };

  const handleKeyPress = (e) =&gt; { if (e.key === &apos;Enter&apos;) handleSearch(); };

  return (
    &lt;&gt;
      &lt;Head&gt;
        &lt;title&gt;Wallet Lookup | Polymarket Dashboard&lt;/title&gt;

        &lt;div className=&quot;breadcrumb&quot;&gt;

          &lt;/span&gt;
          &lt;span className=&quot;breadcrumb-sep&quot;&gt;/&lt;/span&gt;
          &lt;span className=&quot;breadcrumb-item&quot; style={{fontWeight: 500, color: &apos;var(--color-text)&apos;}}&gt;Wallet Lookup&lt;/span&gt;
        &lt;/div&gt;
      &lt;/div&gt;

      &lt;div className=&quot;app-content&quot;&gt;
        {!searched &amp;&amp; !loading &amp;&amp; !data &amp;&amp; (
          &lt;div id=&quot;onboardingSection&quot;&gt;
            &lt;div className=&quot;page-header&quot;&gt;
              &lt;div&gt;
                &lt;h1 className=&quot;page-title&quot;&gt;Wallet Lookup&lt;/h1&gt;
                &lt;p className=&quot;page-subtitle&quot;&gt;Analyze any Polymarket wallet: score, verdict, and trade patterns&lt;/p&gt;
              &lt;/div&gt;
            &lt;/div&gt;
            &lt;div className=&quot;onboarding-card&quot;&gt;
              &lt;h2&gt;Understand any trader in seconds&lt;/h2&gt;
              &lt;p&gt;Enter a wallet address below to see their performance score, win rate, profitability, risk flags, and a plain-English verdict on their trading quality.&lt;/p&gt;
              &lt;div&gt;
                &lt;div style={{fontSize: &apos;var(--text-xs)&apos;, color: &apos;var(--color-text-muted)&apos;, marginBottom: 6}}&gt;Try an example wallet:&lt;/div&gt;
                &lt;div className=&quot;example-wallet&quot; onClick={() =&gt; { setQuery(&apos;0x7a250d5630b4cf539739df2c5dacb4c659f2488d&apos;); handleSearch(&apos;0x7a250d5630b4cf539739df2c5dacb4c659f2488d&apos;); }}&gt;
                  &lt;i data-lucide=&quot;copy&quot; width=&quot;12&quot; height=&quot;12&quot;&gt;&lt;/i&gt;
                  0x7a250d5630b4cf539739df2c5dacb4c659f2488d
                &lt;/div&gt;
              &lt;/div&gt;
            &lt;/div&gt;
          &lt;/div&gt;
        )}

        {/* Search bar */}
        &lt;div className=&quot;card&quot; style={{ marginBottom: &apos;var(--space-6)&apos; }}&gt;
          &lt;div className=&quot;search-box&quot;&gt;
            &lt;i data-lucide=&quot;search&quot; width=&quot;16&quot; height=&quot;16&quot; className=&quot;search-icon&quot;&gt;&lt;/i&gt;
            &lt;input 
              type=&quot;text&quot; 
              value={query}
              onChange={(e) =&gt; setQuery(e.target.value)}
              onKeyDown={handleKeyPress}
              placeholder=&quot;Enter wallet address (0x...)&quot; 
              autoComplete=&quot;off&quot; 
              spellCheck=&quot;false&quot; 
            /&gt;
            &lt;button className=&quot;search-btn&quot; onClick={() =&gt; handleSearch()} disabled={loading}&gt;
              {loading ? &apos;Analyzing...&apos; : &apos;Analyze&apos;}
            &lt;/button&gt;
          &lt;/div&gt;
        &lt;/div&gt;

        {/* Results area */}
        &lt;div id=&quot;walletResults&quot;&gt;
          {loading &amp;&amp; (
            &lt;&gt;
              &lt;div className=&quot;wallet-header&quot;&gt;
                &lt;div className=&quot;skeleton skel-badge&quot;&gt;&lt;/div&gt;
                &lt;div className=&quot;wallet-header-info&quot;&gt;
                  &lt;div className=&quot;skeleton skel-h&quot; style={{width: &apos;60%&apos;}}&gt;&lt;/div&gt;

                &lt;i data-lucide=&quot;refresh-cw&quot; width=&quot;14&quot; height=&quot;14&quot;&gt;&lt;/i&gt;
                Try again
              &lt;/button&gt;
            &lt;/div&gt;
          )}

          {data &amp;&amp; !loading &amp;&amp; !error &amp;&amp; (
            &lt;WalletAnalysis data={data} /&gt;
          )}
        &lt;/div&gt;
      &lt;/div&gt;
    &lt;/&gt;
  );
}
